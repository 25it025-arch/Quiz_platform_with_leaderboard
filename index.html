<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Platform with Leaderboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏆 Quiz Platform</h1>

    <div id="start-screen">

        <input
            type="text"
            id="playerName"
            placeholder="Enter Your Name">

        <button id="startBtn">
            Start Quiz
        </button>

    </div>

    <div id="quiz-screen" class="hidden">

        <div id="question-count"></div>

        <h2 id="question"></h2>

        <div id="answers"></div>

        <button id="nextBtn">
            Next Question
        </button>

    </div>

    <div id="result-screen" class="hidden">

        <h2 id="finalScore"></h2>

        <button onclick="restartQuiz()">
            Play Again
        </button>

    </div>

    <div class="leaderboard">

        <h2>🥇 Leaderboard</h2>

        <div id="leaderboardList"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
